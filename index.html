<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bang IB Shop - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 dark:from-gray-900 dark:to-gray-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold text-green-600 dark:text-green-400">🛍️ Bang IB Shop</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Belanja seru, harga bersahabat</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8">
      <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Masuk ke Akun</h2>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
          <input id="email" type="email" required placeholder="email@contoh.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
          <div class="relative">
            <input id="password" type="password" required placeholder="Minimal 6 karakter"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 transition">
            <button type="button" onclick="togglePass()" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">👁️</button>
          </div>
        </div>
        <div class="flex justify-end text-xs">
          <button type="button" onclick="openForgotModal()" class="text-green-600 dark:text-green-400 hover:underline font-medium">Lupa Password?</button>
        </div>
        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition text-base">
          Masuk
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-5">
        Belum punya akun?
        <a href="register.html" class="text-green-600 hover:underline font-medium">Daftar sekarang</a>
      </p>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">Demo: daftar akun baru untuk mulai belanja</p>
  </div>

  <button onclick="toggleDark()" id="dark-toggle"
    class="fixed bottom-5 right-5 w-12 h-12 rounded-full bg-white dark:bg-gray-700 shadow-lg text-xl flex items-center justify-center hover:scale-110 transition">
    🌙
  </button>

  <!-- Modal Lupa Password -->
  <div id="forgot-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl w-full max-w-sm p-6 text-center">
      <div class="text-4xl mb-3">🔑</div>
      <h3 class="font-bold text-gray-800 dark:text-white text-lg mb-1">Lupa Password?</h3>
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Masukkan email akun kamu. Sistem akan menghubungkanmu ke WhatsApp Admin untuk permintaan reset password.</p>
      <input id="forgot-email" type="email" placeholder="email@contoh.com"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 text-sm mb-4">
      <div class="flex gap-2">
        <button type="button" onclick="document.getElementById('forgot-modal').classList.add('hidden')"
          class="flex-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 text-gray-700 dark:text-gray-300 font-semibold py-2.5 rounded-xl transition text-sm">
          Batal
        </button>
        <button type="button" onclick="requestPasswordReset()"
          class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-xl transition text-sm shadow-md flex items-center justify-center gap-1.5">
          <span>📲</span> Minta Reset
        </button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    initLogin();
    document.getElementById('dark-toggle').textContent = Utils.isDark() ? '☀️' : '🌙';
    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
    function openForgotModal() {
      document.getElementById('forgot-email').value = document.getElementById('email').value || '';
      document.getElementById('forgot-modal').classList.remove('hidden');
    }
    function requestPasswordReset() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) {
        Utils.showToast('Masukkan alamat email kamu.', 'error');
        return;
      }
      const waNumber = localStorage.getItem('tektok_store_wa') || '6287713726230';
      const text = `Halo Admin Bang IB Shop, saya lupa password untuk akun dengan email: *${email}*. Mohon bantuannya untuk mereset password akun saya agar bisa login kembali. Terima kasih!`;
      const url = `https://wa.me/${waNumber}?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
      document.getElementById('forgot-modal').classList.add('hidden');
      Utils.showToast('Mengalihkan ke WhatsApp Admin...', 'info');
    }
  </script>
</body>
</html>
